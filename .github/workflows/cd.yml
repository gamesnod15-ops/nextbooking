name: CD — Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Build and push Docker images
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/randevumkolay-api:latest
            ${{ secrets.DOCKER_USERNAME }}/randevumkolay-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Admin Panel
        uses: docker/build-push-action@v5
        with:
          context: frontend/admin-panel
          file: infra/docker/Dockerfile.admin
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/randevumkolay-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/randevumkolay-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to server via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/randevumkolay
            docker compose -f infra/docker/docker-compose.yml pull
            docker compose -f infra/docker/docker-compose.yml up -d --remove-orphans
            docker image prune -f
