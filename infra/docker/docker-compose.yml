version: "3.9"

services:
  postgres:
    image: "postgres:16-alpine"
    restart: "unless-stopped"
    environment:
      POSTGRES_DB: "randevumkolay"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: "10s"
      timeout: "5s"
      retries: 5

  redis:
    image: "redis:7-alpine"
    restart: "unless-stopped"
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - "redis_data:/data"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: "10s"
      timeout: "5s"
      retries: 5

  api:
    build:
      context: "../.."
      dockerfile: "infra/docker/Dockerfile.api"
    restart: "unless-stopped"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=randevumkolay;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER:-randevumkolay.com}"
      Jwt__Audience: "${JWT_AUDIENCE:-randevumkolay.com}"
      Smtp__Host: "${SMTP_HOST}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__UserName: "${SMTP_USER}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-noreply@randevumkolay.com}"
      NetGsm__UserCode: "${NETGSM_USER_CODE}"
      NetGsm__Password: "${NETGSM_PASSWORD}"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: "service_healthy"
      redis:
        condition: "service_healthy"

  business-panel:
    build:
      context: "../../frontend/bussines-panel"
      dockerfile: "../../infra/docker/Dockerfile.admin"
    restart: "unless-stopped"
    environment:
      VITE_API_URL: "http://api:8080"
    ports:
      - "3000:80"
    depends_on:
      - "api"

  marketing-web:
    build:
      context: "../../frontend/apps/web"
      dockerfile: "../../infra/docker/Dockerfile.web"
    restart: "unless-stopped"
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8080"
    ports:
      - "3004:3000"
    depends_on:
      - "api"

  nginx:
    image: "nginx:alpine"
    restart: "unless-stopped"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "../nginx/nginx.conf:/etc/nginx/nginx.conf:ro"
      - "/etc/letsencrypt:/etc/letsencrypt:ro"
    depends_on:
      - "api"
      - "business-panel"
      - "marketing-web"

volumes:
  postgres_data:
  redis_data:
